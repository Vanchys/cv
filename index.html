<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <!-- Favicons multi-plataforma -->
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <!-- Meta para moviles y previews NFC/QR/Compartir -->
    <meta name="application-name" content="Ivan Apolinar">
    <meta name="apple-mobile-web-app-title" content="Tarjeta de Presentacion | Ivan Apolinar">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Escanea mi tarjeta digital y guarda mi contacto.">
    <!-- Open Graph (WhatsApp, iMessage, redes sociales) -->
    <meta property="og:title" content="Tarjeta de Presentacion | Ivan Apolinar">
    <meta property="og:description" content="Escanea mi tarjeta digital y guarda mi contacto.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=TU_ID_AQUI"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'TU_ID_AQUI');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Critical mobile override CSS -->
    <style>
        html, body, #app-wrapper, #app-content {
            overflow-x: hidden !important;
            max-width: 100vw !important;
        }
        /* Hide nav labels on mobile - overrides Tailwind */
        .nav-label { display: none !important; }
        @media (min-width: 640px) {
            .nav-label { display: inline !important; }
        }
        /* Ensure sections never exceed viewport */
        section, #main-content, footer {
            max-width: 100vw !important;
            box-sizing: border-box !important;
        }
        /* High-Impact Rotating Border Animation (Loading-like) */
        .is-selected {
            position: relative;
            z-index: 10;
            transform: scale(1.05) !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4) !important;
        }
        .is-selected::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 9999px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-bottom-color: #fff;
            animation: border-spin 1s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes border-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="bg-black text-white" style="overflow-x:hidden!important;width:100%!important;max-width:100vw!important;position:relative;">
    <!-- Pantalla de carga (Logo y Barra) -->
    <div id="preloader"
        class="fixed top-0 left-0 w-full h-screen h-[100dvh] z-[9999] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-48 h-48 mb-10 animate-pulse relative">
            <div
                class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-purple-500 to-pink-500 rounded-full blur-2xl opacity-60 animate-pulse">
            </div>
            <img src="logo.png" alt="Logo Ivan Apolinar" class="w-full h-full object-contain relative z-10">
        </div>
        <div class="w-64 h-2 bg-gray-800 rounded-full overflow-hidden shadow-[0_0_15px_rgba(255,0,128,0.3)]">
            <div id="preloader-bar"
                class="h-full bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 w-0 transition-all duration-200">
            </div>
        </div>
        <div id="preloader-text"
            class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-500 text-sm mt-6 font-mono tracking-widest font-bold">
            CARGANDO 0%</div>
    </div>
    <!-- Barra de progreso -->
    <div style="position:fixed;top:0;left:0;right:0;height:3px;background:#111;z-index:50;">
        <div id="progress-bar"
            style="height:100%;background:linear-gradient(to right,#ff0080,#8000ff,#00bfff);transition:width 0.3s ease;width:0%;"></div>
    </div>

    <!-- Navegación -->
    <nav style="position:fixed;top:0.75rem;left:0;right:0;z-index:40;display:flex;justify-content:center;padding:0 0.5rem;overflow:hidden;pointer-events:none;">
        <div id="nav-container" style="pointer-events:all;">
            <!-- Nav items generated by JS -->
        </div>
    </nav>

    <div id="app-wrapper">
    <div id="app-content" class="page-loading" style="position:relative;width:100%;max-width:100%;overflow-x:hidden;">
        <!-- Fondo animado -->
        <div style="position:fixed;inset:0;overflow:hidden;z-index:0;width:100%;max-width:100vw;">
            <div id="animated-bg" style="position:absolute;inset:0;opacity:0.4;width:100%;height:100%;"></div>
            <div id="particles" style="position:absolute;inset:0;overflow:hidden;width:100%;height:100%;"></div>
        </div>

        <!-- Contenido principal -->
        <div id="main-content" class="relative z-10">
            <!-- Sections generated by JS -->
        </div>

        <!-- Footer -->
        <footer class="py-12 px-8 border-t border-white/10">
            <div class="max-w-6xl mx-auto text-center">
                <p class="text-gray-400 mb-4" id="footer-text"></p>
                <p class="text-gray-500 text-sm">
                    © <span id="current-year"></span> Todos los derechos reservados
                </p>
            </div>
        </footer>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
